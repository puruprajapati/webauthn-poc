spring:
  application:
    name: webauthn

fidoserver:
  hostname: localhost
  display: sample webauthn
  origin: http://localhost:3000/
  relyingParty: test
  relyingPartyId: localhost
  timeout: 60000
  userVerificationRequired: false
  userPresenceRequired: false
  attesattion-mode: PREFERRED
  pinned-roots:
    expiry-warning-days: 180
    log-finger-prints: true
    apple:
      remote-drift-check-enabled: true
      remote-pem-url: https://www.apple.com/certificateauthority/Apple_WebAuthn_Root_CA.pem
      expected-sha256: ""
      fail-on-fingerprint-mismatch: false
      remote-check-timeout-ms: 5000

